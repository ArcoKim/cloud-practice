apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: amazon-cloudwatch
  labels:
    k8s-app: fluent-bit
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush                     5
        Grace                     30
        Log_Level                 error
        Daemon                    off
        HTTP_Server               ${HTTP_SERVER}
        HTTP_Listen               0.0.0.0
        HTTP_Port                 ${HTTP_PORT}
        storage.path              /var/fluent-bit/state/flb-storage/
        storage.sync              normal
        storage.checksum          off
        storage.backlog.mem_limit 5M

    [INPUT]
        Name                tail
        Tag                 application.*
        Path                /var/log/containers/product*.log, /var/log/containers/stress*.log
        multiline.parser    docker, cri
        DB                  /var/fluent-bit/state/flb_container.db
        Mem_Buf_Limit       50MB
        Skip_Long_Lines     On
        Refresh_Interval    10
        Rotate_Wait         30
        storage.type        filesystem
        Read_from_Head      ${READ_FROM_HEAD}

    [FILTER]
        Name    grep
        Match   application.*
        Exclude log /healthcheck

    [OUTPUT]
        Name                cloudwatch_logs
        Match               application.var.log.containers.product*
        region              ${AWS_REGION}
        log_group_name      /skills/app/product
        log_stream_prefix    ${HOST_NAME}-
        auto_create_group   true

    [OUTPUT]
        Name                cloudwatch_logs
        Match               application.var.log.containers.stress*
        region              ${AWS_REGION}
        log_group_name      /skills/app/stress
        log_stream_prefix    ${HOST_NAME}-
        auto_create_group   true