apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-secret
  namespace: skills
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets
    kind: SecretStore
  target:
    name: product
    creationPolicy: Owner
  data:
  - secretKey: dbinfo
    remoteRef:
      key: /skills/app/product