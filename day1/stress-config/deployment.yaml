apiVersion: apps/v1
kind: Deployment
metadata:
  name: stress
  namespace: skills
spec:
  selector:
    matchLabels:
      app: stress
  template:
    metadata:
      labels:
        app: stress
    spec:
      terminationGracePeriodSeconds: 60
      nodeSelector:
        node: app
      tolerations:
      - key: node
        operator: Equal
        value: app
        effect: NoSchedule
      containers:
      - name: stress
        image: 073813292468.dkr.ecr.ap-northeast-2.amazonaws.com/stress:1
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 250m
            memory: 512Mi
        ports:
        - containerPort: 8080